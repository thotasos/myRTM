name: myRTM
options:
  bundleIdPrefix: com.thotas
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  myRTM:
    type: application
    platform: macOS
    sources:
      - myRTM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thotas.myRTM
        PRODUCT_NAME: myRTM
        INFOPLIST_FILE: myRTM/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_ENTITLEMENTS: myRTM/myRTM.entitlements
    entitlements:
      path: myRTM/myRTM.entitlements
      properties:
        com.apple.security.app-sandbox: false

  myRTMTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - myRTMTests
    dependencies:
      - target: myRTM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thotas.myRTMTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/myRTM.app/Contents/MacOS/myRTM"
        BUNDLE_LOADER: "$(TEST_HOST)"
